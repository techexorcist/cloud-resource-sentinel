<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

                <li class="nav-item">
                    <a class="nav-link nav-dashboard" th:href="@{/dashboard}"
                       th:classappend="${#strings.equals(currentPath, '/dashboard') ? 'active' : ''}">
                        <span class="nav-icon">&#x1f4ca;</span>
                        <span>Dashboard</span>
                        <span id="sidebarJobBadge" class="badge bg-warning text-dark ms-auto" style="display:none; font-size:0.65rem;">0</span>

                </li>
                <li class="nav-item">

                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-resources" th:href="@{/dashboard/resources}"

</html>
