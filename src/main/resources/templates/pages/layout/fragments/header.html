<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="header">
        <nav class="navbar bg-gradient sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                    <span class="brand-icon me-2">&#x1f6e1;&#xfe0f;</span>
                    <span class="brand-text">Cloud Resource Sentinel</span>
                </a>
                <div class="d-flex align-items-center">
                    <button id="themeToggle" class="btn btn-sm" title="Toggle theme">
                        <span class="theme-icon">&#x1f319;</span>
                    </button>
                </div>
            </div>
        </nav>
        <div id="globalProgressBar" style="display:none;">
            <div style="background: var(--bg-primary); border-bottom: 1px solid var(--border-color); padding: 0.4rem 1rem;">
                <div class="d-flex align-items-center">
                    <span class="spinner-border spinner-border-sm me-2 text-primary" role="status"></span>
                    <span id="progressMessage" class="me-3 small fw-semibold" style="color: var(--text-secondary);">Analysing...</span>
                    <div class="progress flex-grow-1">
                        <div id="progressBarFill" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;"></div>
                    </div>
                    <span id="progressPercent" class="ms-2 small fw-semibold" style="color: var(--text-secondary);">0%</span>
                    <button id="cancelJobBtn" class="btn btn-sm btn-outline-danger ms-3 py-0 px-2" onclick="cancelCurrentJob()" title="Stop scan" style="font-size: 0.75rem;">Stop</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
