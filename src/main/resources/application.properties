server.port=${PORT:8000}
spring.threads.virtual.enabled=true
spring.jackson.property-naming-strategy=SNAKE_CASE

# Ollama (local AI)
spring.ai.ollama.base-url=${OLLAMA_HOST:http://localhost:11434}
spring.ai.ollama.chat.model=${ai.models.ollama.default}
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.top-p=0.9

# HTTP client timeouts — prevents indefinite hangs on Ollama socket reads
# read-timeout must be long enough for LLM inference (5 min for large prompts on CPU)
spring.http.clients.connect-timeout=10s
spring.http.clients.read-timeout=5m

# AWS Bedrock (cloud AI)
spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.chat.options.model=${ai.models.bedrock.default}
spring.ai.bedrock.converse.chat.options.temperature=0.3
spring.ai.bedrock.converse.chat.options.max-tokens=4096

# AI model configuration — add/remove models here, first entry is the default
ai.models.ollama.default=llama3.2:latest
ai.models.ollama=llama3.2:latest,qwen2.5:3b,phi3:latest,gemma2:latest,mistral:latest,deepseek-r1:latest
ai.models.bedrock.default=us.anthropic.claude-sonnet-4-6
ai.models.bedrock=us.anthropic.claude-sonnet-4-6,us.anthropic.claude-haiku-4-5-20251001,us.anthropic.claude-opus-4-6,us.amazon.nova-premier-v1:0,us.amazon.nova-pro-v1:0,us.amazon.nova-lite-v1:0

# AWS & pricing
aws.default-region=us-east-1
pricing.cache.ttl-hours=24

# AI analysis timeout per batch (seconds) — increase for slow local models
ai.timeout-seconds=1200

# AWS SDK timeouts — fail fast for read-only scanning
aws.sdk.max-retries=1
aws.sdk.api-call-timeout-seconds=10
aws.sdk.api-call-attempt-timeout-seconds=5

# Audit trail
cloud-sentinel.audit.retention-days=90

# Scheduled scans (disabled by default — enable to run automatic scans)
cloud-sentinel.scheduled-scan.enabled=false
cloud-sentinel.scheduled-scan.cron=0 0 6 * * *
cloud-sentinel.scheduled-scan.category=FULL
cloud-sentinel.scheduled-scan.ai-enabled=false
cloud-sentinel.scheduled-scan.ai-provider=bedrock
cloud-sentinel.scheduled-scan.regions=

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.cloudsentinel.controller
springdoc.paths-to-exclude=/,/dashboard/**

# Actuator / Ops visibility
management.endpoints.web.exposure.include=health,info,metrics,blocked-operations
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Cloud Resource Sentinel
info.app.version=1.0.0
info.app.description=AI-powered AWS account watchdog

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Static resource caching — disabled by default for development convenience.
# For production, set RESOURCE_CACHE_PERIOD=3600 and RESOURCE_NO_CACHE=false
spring.web.resources.cache.period=${RESOURCE_CACHE_PERIOD:0}
spring.web.resources.cache.cachecontrol.no-cache=${RESOURCE_NO_CACHE:true}
