metrics_note:
  title: "How Recommendations Affect Dashboard Metrics"
  text: "Resources with the following recommendation prefixes count as Actionable Findings. For COST findings, their monthly cost is included in Potential Savings:"
  keywords: [Idle, Terminating, Delete, Release, Unused, Empty, Inactive, Stopped, Rotate, Enable, Restrict, Expired, Exposed, Missing, Stale, Misconfigured]
  footer: "Resources with Review, Low Utilization, or Moderate Utilization are flagged but do not count toward actionable/savings totals. Active resources require no action. Potential Savings only includes COST findings — security/governance findings are counted as actionable but don't contribute to the dollar savings figure."
