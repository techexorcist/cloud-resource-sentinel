id: api
title: API Reference
sections:
  - title: Interactive API Explorer
    type: note
    text: "Explore and test all endpoints interactively using the Swagger UI."
    link: "/swagger-ui.html"
    link_text: "Open Swagger UI"
  - title: API Endpoints
    type: table
    columns: [Method, Path, Description, Response]
    rows:
      - [GET, /api/info, "Version information", JSON]
      - [GET, /profiles, "List AWS profiles from ~/.aws/config", JSON]
      - [GET, /regions, "List available AWS regions (30)", JSON]
      - [GET, "/profiles/check?profileName=", "Check credential health for a profile", JSON]
      - [GET, /ai/status, "Check AI provider availability and models", JSON]
      - [GET, /ai/ollama/models, "List locally pulled Ollama models with full_scan_capable flag", JSON]
      - [GET, /ai/health, "AI provider warmup/readiness status", JSON]
      - [POST, /analyse, "Submit analysis job (async)", "{job_id}"]
      - [POST, /analyse/batch, "Batch scan multiple profiles", "JSON with submitted/skipped counts"]
      - [POST, /analyse/cancel, "Cancel a running job", JSON]
      - [POST, /analyse/cancel-all, "Cancel all running jobs and replace executor pool", JSON]
      - [GET, "/analyse/job?jobId=", "Poll job progress", "JSON with phase, progress, report"]
      - [GET, /analyse/jobs, "List all jobs with capacity info", JSON]
      - [GET, "/analyse/status?profileName=", "Check if cached report exists", JSON]
      - [GET, "/analyse/cached?profileName=", "Get latest cached report for profile", ScanReportDto]
      - [GET, "/analyse/reports?profileName=", "Get all reports for profile (up to 3)", "JSON array"]
      - [GET, /analyse/compare, "Compare two reports (diff)", "JSON with added/removed/changed"]
      - [GET, /analyse/cache/count, "Get cached report counts per account", JSON]
      - [POST, /analyse/cache/clear, "Clear all cached reports", JSON]
      - [GET, "/analyse/audit?limit=", "Audit trail history", JSON array]
      - [POST, /export/csv, "Export resources as CSV", CSV file]
      - [GET, /pricing/status, "Pricing data status and last updated", JSON]
      - [GET, /pricing/progress, "Pricing refresh progress", JSON]
      - [POST, /pricing/refresh, "Refresh pricing from AWS Pricing API", JSON]
      - [GET, /settings/ai, "Get current AI settings", JSON]
      - [POST, /settings/ai, "Update AI settings at runtime", JSON]
      - [POST, /docs/reload, "Reload documentation from YAML files", JSON]
  - title: Analysis Request Body
    type: code
    language: json
    content: |
      {
        "profile_name": "my-aws-profile",
        "regions": ["us-east-1", "eu-west-1"],
        "enable_ai_filter": true,
        "ai_provider": "bedrock",
        "ai_model": "us.anthropic.claude-sonnet-4-6",
        "scan_category": "full",
        "credentials": null
      }
    details:
      - heading: Fields
        items:
          - "`profile_name` — AWS profile from ~/.aws/config (optional)"
          - "`regions` — list of regions to scan, null for all 30"
          - "`enable_ai_filter` — enable AI-powered analysis"
          - "`ai_provider` — \"ollama\" or \"bedrock\""
          - "`ai_model` — specific model name (e.g. \"qwen2.5:3b\", \"us.anthropic.claude-sonnet-4-6\")"
          - "`scan_category` — \"cost_idle\", \"security_governance\", or \"full\" (default)"
      - heading: Authentication
        items:
          - "Use `profile_name` for SSO profiles"
          - "Or provide `credentials` with access_key_id, secret_access_key, session_token"
          - "Leave both blank to use default environment credentials"
